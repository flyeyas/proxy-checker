services:
  proxy-forge:
    image: "${IMAGE:?set IMAGE, for example ghcr.io/flyeyas/proxy-forge:v0.1.1}"
    container_name: proxy-forge
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8888}:8888"
      - "${PROXY_HOST_BIND:-127.0.0.1}:${PROXY_HOST_PORT:-7890}:7890"
    environment:
      PORT: "8888"
      PROXY_GATEWAY_ENABLED: "${PROXY_GATEWAY_ENABLED:-true}"
      PROXY_GATEWAY_BIND: "0.0.0.0"
      PROXY_GATEWAY_PORT: "7890"
      PROXY_GATEWAY_GRADES: "${PROXY_GATEWAY_GRADES:-A,B}"
      PROXY_GATEWAY_TOKEN: "${PROXY_GATEWAY_TOKEN:-}"
      PROXY_GATEWAY_TIMEOUT: "${PROXY_GATEWAY_TIMEOUT:-20}"
      AUTH_PASSWORD: "${AUTH_PASSWORD:?set AUTH_PASSWORD in .env before starting}"
      AUTH_SESSION_DAYS: "${AUTH_SESSION_DAYS:-7}"
      CHECK_ROUNDS: "${CHECK_ROUNDS:-2}"
      MAX_CHECK_ROUNDS: "${MAX_CHECK_ROUNDS:-3}"
      MAX_CONCURRENT: "${MAX_CONCURRENT:-30}"
      MAX_CONCURRENT_LIMIT: "${MAX_CONCURRENT_LIMIT:-200}"
      TIMEOUT: "${TIMEOUT:-12}"
      DETECT_TIMEOUT: "${DETECT_TIMEOUT:-8}"
      LOG_LIMIT: "${LOG_LIMIT:-100}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Shanghai}"
      LOG_FILE: "/app/logs/server.log"
    volumes:
      - proxy_forge_repo:/app/repo_data
      - proxy_forge_checked:/app/checked_data
      - proxy_forge_auto:/app/auto_data
      - proxy_forge_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; req=urllib.request.Request('http://127.0.0.1:8888/api/capabilities', data=b'{}', headers={'Content-Type':'application/json'}); urllib.request.urlopen(req, timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  proxy_forge_repo:
  proxy_forge_checked:
  proxy_forge_auto:
  proxy_forge_logs:
