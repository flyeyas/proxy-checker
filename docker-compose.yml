services:
  proxy-checker:
    image: "${IMAGE_NAME:-proxy-checker}:${VERSION:-v0.1.1}"
    build:
      context: .
      args:
        PYTHON_IMAGE: "${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.12-slim}"
    container_name: proxy-checker
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8888}:8888"
    environment:
      PORT: "8888"
      AUTH_PASSWORD: "${AUTH_PASSWORD:?set AUTH_PASSWORD in .env before starting}"
      AUTH_SESSION_DAYS: "${AUTH_SESSION_DAYS:-7}"
      CHECK_ROUNDS: "${CHECK_ROUNDS:-2}"
      MAX_CHECK_ROUNDS: "${MAX_CHECK_ROUNDS:-3}"
      MAX_CONCURRENT: "${MAX_CONCURRENT:-30}"
      MAX_CONCURRENT_LIMIT: "${MAX_CONCURRENT_LIMIT:-200}"
      TIMEOUT: "${TIMEOUT:-12}"
      DETECT_TIMEOUT: "${DETECT_TIMEOUT:-8}"
      RUN_LOG_LIMIT: "${RUN_LOG_LIMIT:-100}"
      APP_TIMEZONE: "${APP_TIMEZONE:-Asia/Shanghai}"
      LOG_FILE: "/app/run_logs/server.log"
    volumes:
      - proxy_checker_repo:/app/repo_data
      - proxy_checker_checked:/app/checked_data
      - proxy_checker_auto:/app/auto_data
      - proxy_checker_logs:/app/run_logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; req=urllib.request.Request('http://127.0.0.1:8888/api/capabilities', data=b'{}', headers={'Content-Type':'application/json'}); urllib.request.urlopen(req, timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  proxy_checker_repo:
  proxy_checker_checked:
  proxy_checker_auto:
  proxy_checker_logs:
